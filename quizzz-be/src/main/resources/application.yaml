server:
  port: 8080
  servlet:
    context-path: /quizzz
spring:
  datasource:
    url: "jdbc:mysql://localhost:3306/quizzz"
    username: root
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: your_email@gmail.com
    password: app_password
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: YOUR_CLIENT_ID
            client-secret: YOUR_SECRET
            scope:
              - email
              - profile